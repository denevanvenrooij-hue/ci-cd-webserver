server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # OAuth2 proxy — forward all /oauth2/ requests to the in-process oauth2-proxy
    location ^~ /oauth2/ {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                https;
        proxy_set_header X-Forwarded-Proto       https;
	proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Internal auth check endpoint used by auth_request
    location = /oauth2/auth {
        proxy_pass              http://127.0.0.1:4180;
        proxy_set_header        Host            	$host;
        proxy_set_header        X-Real-IP       	$remote_addr;
        proxy_set_header 	X-Scheme                https;
        proxy_set_header 	X-Forwarded-Proto       https;
	proxy_set_header        X-Forwarded-Uri 	$request_uri;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  	"";
    }

    # Health check — no auth required
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Protected: static assets (regex takes priority over location /, so auth is explicit here)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        auth_request   /oauth2/auth;
        error_page 401 = @oauth2_signin;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Protected: everything else — SPA-friendly fallback
    location / {
        auth_request   /oauth2/auth;
        error_page 401 = @oauth2_signin;
        try_files $uri $uri/ /index.html;
    }

    # Redirect unauthenticated users to the OAuth2 sign-in page
    location @oauth2_signin {
        return 302 $scheme://$host/oauth2/sign_in?rd=$request_uri;
    }
}
